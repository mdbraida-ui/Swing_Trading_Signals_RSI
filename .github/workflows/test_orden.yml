name: Test Orden Real (compra 1 acción y vende)

on:
  workflow_dispatch:
    inputs:
      confirmacion:
        description: 'Escribí exactamente CONFIRMAR para ejecutar (cualquier otra cosa aborta)'
        required: true
        default: 'no'
      ticker:
        description: 'Ticker a probar (con .BA)'
        required: true
        default: 'COME.BA'
      cantidad:
        description: 'Cantidad de acciones (dejar en 1)'
        required: true
        default: '1'

jobs:
  probar_orden:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install requests

      - name: Correr test de orden real
        env:
          # Solo se activa si el usuario escribió "CONFIRMAR" exacto en el input
          CONFIRMAR_ORDEN_REAL: ${{ inputs.confirmacion == 'CONFIRMAR' && 'SI' || 'NO' }}
          TICKER_PRUEBA: ${{ inputs.ticker }}
          CANTIDAD_PRUEBA: ${{ inputs.cantidad }}
          IOL_USUARIO: ${{ secrets.IOL_USUARIO }}
          IOL_PASSWORD: ${{ secrets.IOL_PASSWORD }}
        run: python test_orden.py
