name: Diagnostico Detalle Operacion

on:
  workflow_dispatch:

jobs:
  diagnosticar:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install requests

      - name: Consultar detalle de las operaciones
        env:
          IOL_USUARIO: ${{ secrets.IOL_USUARIO }}
          IOL_PASSWORD: ${{ secrets.IOL_PASSWORD }}
        run: python test_detalle_operacion.py
