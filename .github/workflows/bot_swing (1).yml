name: Bot Swing Diario

on:
  schedule:
    # UN SOLO disparador cada 5 min, de 13:00 a 21:55 UTC (10:00 a 18:55
    # ART) -- cubre con margen la ventana de apertura (10:25-11:30) y la
    # de cierre (17:00-18:00). Con reintentos tan seguidos ya no es tan
    # crítico esquivar los minutos ":00"/":30" como cuando dependíamos
    # de un único disparo puntual -- si ese tick puntual se demora, el
    # siguiente (5 min después) compensa solo.
    - cron: "*/5 13-21 * * 1-5"
  workflow_dispatch:
    inputs:
      modo:
        description: "apertura, monitoreo o cierre (fuerza esa rutina sola, sin importar la hora)"
        required: true
        default: "apertura"

jobs:
  correr_bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5   # cada corrida es corta -- si algo cuelga, se corta solo
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install yfinance ta pandas numpy requests gspread google-auth

      - name: Correr rutina del bot
        env:
          # Si viene de workflow_dispatch (corrida manual), MODO_RUTINA
          # fuerza esa rutina sola. Si viene del cron automático, esta
          # variable queda vacía y el script decide solo según la hora
          # real (ver bot_swing_diario.py, sección PUNTO DE ENTRADA).
          MODO_RUTINA: ${{ github.event_name == 'workflow_dispatch' && inputs.modo || '' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SHEETS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}
          IOL_USUARIO: ${{ secrets.IOL_USUARIO }}
          IOL_PASSWORD: ${{ secrets.IOL_PASSWORD }}
        run: python bot_swing_diario.py

# NOTA: GitHub documenta que los horarios ":00" y ":30" en punto son los
# de mayor congestión, con demoras reportadas de 15 a 45+ minutos (en
# nuestro caso se vio hasta 1h45). Con un disparador cada 5 min durante
# toda la ventana relevante, aunque UN disparo puntual llegue tarde, el
# siguiente (5 min después) lo compensa -- ya no depende de acertar un
# único minuto exacto. Si en algún momento se necesitara garantía real
# de horario, la alternativa es un disparador externo (cron-job.org,
# EasyCron, etc.) llamando a la API de GitHub (workflow_dispatch) --
# bypassea la cola de cron de GitHub por completo, a cambio de depender
# de un servicio externo adicional.
